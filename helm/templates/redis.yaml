{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spamfilter-redis
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spamfilter-redis
    app.kubernetes.io/part-of: spamfilter-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spamfilter-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spamfilter-redis
        app.kubernetes.io/part-of: spamfilter-stack
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: spamfilter-redis
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spamfilter-redis
    app.kubernetes.io/part-of: spamfilter-stack
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spamfilter-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- end }}
