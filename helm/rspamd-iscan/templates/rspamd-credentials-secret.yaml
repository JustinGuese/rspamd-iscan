{{- $existing := lookup "v1" "Secret" .Release.Namespace "spamfilter-rspamd-credentials" -}}
{{- $password := "" -}}
{{- if $existing -}}
  {{- $password = index $existing.data "controllerPassword" | b64dec -}}
{{- else -}}
  {{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: spamfilter-rspamd-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: spamfilter-rspamd-credentials
    app.kubernetes.io/part-of: spamfilter-stack
type: Opaque
stringData:
  controllerPassword: {{ $password }}

  worker-controller.inc: |
    password = "{{ $password }}";
    enable_password = "{{ $password }}";

  rspamd-iscan-config.toml: |
    RspamdURL         = "http://spamfilter-rspamd.{{ .Release.Namespace }}.svc.cluster.local:11334"
    RspamdPassword    = "{{ $password }}"

    ImapAddr          = "{{ .Values.rspamdIscan.imapAddr }}"
    ImapUser          = "{{ .Values.rspamdIscan.imapUser }}"
    ImapPassword      = "{{ .Values.rspamdIscan.imapPassword }}"

    InboxMailbox      = "{{ .Values.rspamdIscan.mailboxes.inbox }}"
    SpamMailbox       = "{{ .Values.rspamdIscan.mailboxes.spam }}"
    HamMailbox        = "{{ .Values.rspamdIscan.mailboxes.ham }}"
    UndetectedMailbox = "{{ .Values.rspamdIscan.mailboxes.undetected }}"
    BackupMailbox     = "{{ .Values.rspamdIscan.mailboxes.backup }}"
    ScanMailbox       = "{{ .Values.rspamdIscan.mailboxes.scan }}"

    TempDir           = "{{ .Values.rspamdIscan.tempDir }}"
    KeepTempFiles     = {{ .Values.rspamdIscan.keepTempFiles }}
    SpamThreshold     = {{ .Values.rspamdIscan.spamThreshold }}
    LogIMAPData       = {{ .Values.rspamdIscan.logImapData }}
