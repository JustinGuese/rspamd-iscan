apiVersion: apps/v1
kind: Deployment
metadata:
  name: spamfilter-rspamd
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spamfilter-rspamd
    app.kubernetes.io/part-of: spamfilter-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spamfilter-rspamd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spamfilter-rspamd
        app.kubernetes.io/part-of: spamfilter-stack
    spec:
      containers:
        - name: rspamd
          image: {{ .Values.rspamd.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 11333
            - name: controller
              containerPort: 11334
          env:
            - name: REDIS_SERVERS
              value: "{{ .Values.rspamd.redisServer }}"
          volumeMounts:
            - name: rspamd-config
              mountPath: /etc/rspamd/override.d
            - name: rspamd-credentials
              mountPath: /etc/rspamd/override.d/worker-controller.inc
              subPath: worker-controller.inc
          readinessProbe:
            httpGet:
              path: /ping
              port: controller
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: controller
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.rspamd.resources | nindent 12 }}
      volumes:
        - name: rspamd-config
          configMap:
            name: spamfilter-rspamd-config
        - name: rspamd-credentials
          secret:
            secretName: spamfilter-rspamd-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: spamfilter-rspamd
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spamfilter-rspamd
    app.kubernetes.io/part-of: spamfilter-stack
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spamfilter-rspamd
  ports:
    - name: proxy
      port: 11333
      targetPort: proxy
    - name: controller
      port: 11334
      targetPort: controller
